<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f5f0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>心理测评 · Psyche</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ink-bg" aria-hidden="true"></div>
  <div class="shell">
    <header class="topbar">
      <div class="brand" id="brand-home" role="button" tabindex="0" title="返回量表">
        <span class="brand-mark" aria-hidden="true">测</span>
        <div class="brand-text">
          <p class="brand-title">心理测评</p>
          <p class="brand-sub">Psyche</p>
        </div>
      </div>
      <div id="stats" class="metrics"></div>
    </header>
    <div class="tab-row">
      <nav id="nav" class="tabs" aria-label="主导航"></nav>
      <nav id="filters" class="tabs hidden" aria-label="分类"></nav>
    </div>
    <main class="main">
      <section id="view-home" class="view active"></section>
      <section id="view-history" class="view"></section>
      <section id="view-quiz" class="view"></section>
      <section id="view-result" class="view"></section>
    </main>
  </div>
  <script src="boot.mjs" type="module"></script>
</body>
</html>
